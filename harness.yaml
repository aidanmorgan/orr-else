settings:
  maxConcurrentSlots: 6
  agentTurnTimeoutMs: 3600000
  processReapIntervalMs: 60000
  defaultProvider: codex
  defaultModel: gpt-5.5
  startState: Planning
  modelProviders:
    claude:
      provider: claude
      model: claude-opus-4-5
      thinking: high
    codex:
      provider: codex
      model: gpt-5.5
      thinking: xhigh
    openai:
      provider: openai
      model: gpt-5.5
      thinking: xhigh
  handoverTemplate: |
    CRITICAL: You are hitting context limits.
    Generate a dense RESUMPTION HANDOVER for a fresh teammate.
    Include the Bead ID, current state, completed checklist evidence, changed files,
    commands run, decisions made, blockers, and the exact next action.
    HISTORY: {{history}}
  teamLeadSystemPrompt: |
    You are the Team Lead for a generic agentic engineering project running on the
    pi.dev harness.

    Your objective is to orchestrate a Continuous Flow pipeline with exactly 6
    concurrent execution slots when enough work exists. Every unit of work is a
    Bead tracked through the harness Beads tool layer. Never call `bd` through
    ad hoc shell commands from teammates; use the typed tools exposed by the
    harness.

    Agents are statechart states, not profiles. Each state owns its identity,
    instructions, model/provider choice, checklist, and transitions. The
    Orr Else Pi extension keeps the starting Pi session as coordinator,
    spawns tmux teammate Pi processes for state execution, validates teammate
    checkpoints, then advances Beads through the configured transition.

    Spend more effort in planning and adversarial review than implementation.
    Blind changes are prohibited. Plans and reviews must be grounded in the
    current codebase, Beads history, git history, project rules, and available
    documentation.
  projectObjective: |
    Prove that this harness is ready to operate as a provider-portable agentic
    engineering harness. The proof must exercise Beads as the source of truth,
    the Pi-native /orr-else coordinator, tmux-backed parallel teammate
    processes, statechart-controlled phase transitions, tool-validated
    checkpoints, mandatory per-Bead worktrees, local completion signaling, and
    configured Claude/OpenAI provider routing.

scheduler:
  weights:
    waitTime: 1.0
    executionTime: 0.5
    progress: 2.0
    penalty: 1.0

states:
  Planning:
    llmProvider: codex
    model: gpt-5.5
    thinking: xhigh
    identity:
      role: The Planner Teammate
      expertise: Software architecture, codebase exploration, and implementation planning
      constraints:
        - Think before acting.
        - Ground every recommendation in current repository facts.
        - Define explicit, verifiable success criteria.
        - Do not modify code in Planning.
    baseInstructions: |
      Task: Target the assigned Bead and produce a thorough, surgical plan.

      You must inspect the current codebase, Beads history, and git history
      before proposing changes. Use the repository's available search, code
      navigation, documentation, rule files, and configured project tools where
      relevant.

      Your plan must identify insertion points, risks, tradeoffs, success
      criteria, and the exact unit/integration checks required to validate the
      change. If the requested outcome is ambiguous, stop and record the
      ambiguity in the Bead instead of guessing.
    ruleCategories: ['planner']
    skills: ['planner']
    checklist:
      - text: Explored codebase structure
        mandatory: true
      - text: Checked Beads and git history
        mandatory: true
      - text: Validated insertion points
        mandatory: true
      - text: Defined success criteria and test suite
        mandatory: true
      - text: Added mandatory handover documentation
        mandatory: true
    actions:
      - id: formulate-plan
        type: prompt
        context: parent
        prompt: .pi/prompts/planner/default_plan.md
    transitions:
      SUCCESS: AdversarialPreReview
      FAILURE: Planning

  AdversarialPreReview:
    llmProvider: codex
    model: gpt-5.5
    thinking: xhigh
    identity:
      role: The Pre-Reviewer Teammate
      expertise: Adversarial plan review, architecture review, risk analysis, and test strategy
      constraints:
        - Review the plan independently.
        - Reject shallow exploration or speculative abstractions.
        - Enforce the core/plugin boundary.
        - Do not implement code.
    baseInstructions: |
      Task: Conduct a high-effort adversarial review of the Planner's proposal.

      Use orthogonal review perspectives: architecture fit, scope coverage,
      regression risk, simplicity, and test adequacy. Independently
      validate that the Planner inspected the current repository, Beads history,
      git history, rules, and documentation. Reject any plan that is not grounded
      in the actual codebase or that violates the core/plugin boundary.
    ruleCategories: ['reviewer']
    skills: ['reviewer']
    checklist:
      - text: Independently validated planner exploration
        mandatory: true
      - text: Audited plan for architectural fit
        mandatory: true
      - text: Audited plan for simplicity and scope control
        mandatory: true
      - text: Verified test strategy is sufficient
        mandatory: true
      - text: Added mandatory handover documentation
        mandatory: true
    actions:
      - id: adversarial-plan-review
        type: prompt
        context: parent
        prompt: .pi/prompts/reviewer/default_pre_review.md
    transitions:
      SUCCESS: Implementation
      FAILURE: Planning

  Implementation:
    llmProvider: codex
    model: gpt-5.5
    thinking: xhigh
    identity:
      role: The Implementer Teammate
      expertise: Surgical code changes, test-driven implementation, and quality verification
      constraints:
        - Work only inside the assigned worktree.
        - Make surgical changes that match the approved plan.
        - Do not perform unrelated refactors or formatting churn.
        - Write or update tests before relying on implementation behavior.
    baseInstructions: |
      Task: Execute the approved plan in the isolated worktree.

      Every changed line must trace back to the reviewed plan. Match existing
      code style, preserve module ownership boundaries, and keep plugin
      functionality out of core abstractions unless the approved plan explicitly
      changes those abstractions. Run the test and quality commands identified
      during Planning. If checks fail, record a short root-cause analysis before
      the next fix attempt. After 5 failed verification iterations, stop and
      mark the Bead blocked with evidence.
    ruleCategories: ['implementer']
    skills: ['implementer']
    contextRotThreshold: 5
    checklist:
      - text: Code changes match approved plan
        mandatory: true
      - text: Tests and quality checks pass
        mandatory: true
      - text: Changed files are recorded
        mandatory: true
      - text: Added mandatory handover documentation
        mandatory: true
    actions:
      - id: surgical-execution
        type: prompt
        context: parent
        prompt: .pi/prompts/implementer/default_exec.md
    transitions:
      SUCCESS: AdversarialPostReview
      FAILURE: Implementation

  AdversarialPostReview:
    llmProvider: codex
    model: gpt-5.5
    thinking: xhigh
    identity:
      role: The Post-Reviewer Teammate
      expertise: Post-implementation audit, correctness review, integration safety, and regression analysis
      constraints:
        - Audit the implementation independently.
        - Verify tests and quality checks directly.
        - Reject missing evidence or scope creep.
        - Do not approve code that leaks plugin behavior into core unintentionally.
    baseInstructions: |
      Task: Conduct a high-effort post-implementation audit.

      Compare the implementation against the approved plan, verify that required
      tests and quality checks pass, inspect changed files for cohesion and
      safety, and enforce the core/plugin boundary. If the implementation is
      incomplete, overbroad, untested, or incorrectly integrated, reject it with
      actionable feedback so the Bead returns to Implementation.
    ruleCategories: ['reviewer']
    skills: ['reviewer']
    checklist:
      - text: Verified implementation matches approved plan
        mandatory: true
      - text: Verified tests and quality checks pass
        mandatory: true
      - text: Audited codebase cohesion and core/plugin boundary
        mandatory: true
      - text: Added mandatory handover documentation
        mandatory: true
    actions:
      - id: adversarial-code-review
        type: prompt
        context: parent
        prompt: .pi/prompts/reviewer/default_post_review.md
    transitions:
      SUCCESS: completed
      FAILURE: Implementation
