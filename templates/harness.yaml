# ---------------------------------------------------------------------------
# Orr Else starter harness.yaml
# Generated by `orr-else init` — customise for your project.
#
# ORR_ELSE_FRAMEWORK_ROOT is NOT set here and NOT required for normal project use.
# It is only needed when developing the orr-else harness itself.
# ---------------------------------------------------------------------------
settings:
  maxConcurrentSlots: 3
  agentTurnTimeoutMs: 3600000
  processReapIntervalMs: 60000
  defaultProvider: claude
  startState: Planning
  worktreePolicy:
    default: always
  modelProviders:
    claude:
      provider: claude
      model: claude-opus-4-5
      thinking: high
  handoverTemplate: |
    CRITICAL: You are hitting context limits.
    Generate a dense RESUMPTION HANDOVER for a fresh teammate.
    Include the Bead ID, current state, completed checklist evidence, changed files,
    commands run, decisions made, blockers, and the exact next action.
    HISTORY: {{history}}

scheduler:
  algorithm: fifo
  maxQueueDepth: 100

statechart:
  states:
    - Planning
    - Implementation
    - Review
    - Done
  transitions:
    - from: Planning
      to: Implementation
      on: PLAN_APPROVED
    - from: Implementation
      to: Review
      on: IMPLEMENTATION_COMPLETE
    - from: Review
      to: Done
      on: REVIEW_APPROVED
    - from: Review
      to: Implementation
      on: CHANGES_REQUESTED

states:
  - id: Planning
    label: Planning
    actions:
      - id: plan
        type: prompt
        promptKey: planner

  - id: Implementation
    label: Implementation
    actions:
      - id: implement
        type: prompt
        promptKey: implementer

  - id: Review
    label: Review
    actions:
      - id: review
        type: prompt
        promptKey: reviewer

  - id: Done
    label: Done
    terminal: true
